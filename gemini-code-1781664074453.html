<html lang="en">
<head>

    <title>Vault Hub | The Wealth Shift</title>
    <style>
        :root { 
            --bg: #050505; 
            --card-bg: rgba(25, 25, 25, 0.6); 
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6; 
            --text-main: #ffffff; 
            --text-muted: #a3a3a3; 
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px;
            background-image: radial-gradient(circle at 50% 0%, #111 0%, #050505 100%);
            min-height: 100vh;
        }

        .container { max-width: 480px; width: 100%; text-align: center; }

        .hero { margin-bottom: 40px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 24px; 
            margin-bottom: 16px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            text-decoration: none; 
            color: white; 
            display: block; 
            transition: all 0.3s ease;
            text-align: left;
        }

        .card:hover { 
            border-color: var(--accent); 
            transform: translateY(-4px);
            background: rgba(40, 40, 40, 0.8);
        }

        .card h3 { margin: 0 0 8px 0; font-size: 1.2rem; }
        .card p { margin: 0; font-size: 0.9rem; color: var(--text-muted); }

        footer { margin-top: 60px; color: #404040; font-size: 0.8rem; }
    </style>
</head>
